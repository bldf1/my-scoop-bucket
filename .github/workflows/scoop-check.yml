name: Scoop Autoupdate (Private)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: scoop-autoupdate
  cancel-in-progress: true

jobs:
  update:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Scoop & Checkver
        shell: pwsh
        run: |
          # 安装 Scoop（如果尚未安装）
          if (-not (Get-Command scoop -ErrorAction SilentlyContinue)) {
              Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          }
          
          # 添加当前 bucket
          scoop bucket add my-scoop-bucket .
          
          # 执行 checkver 并自动更新
          # -u: 自动更新 manifest
          # -f: 强制检查（忽略缓存）
          # --commit: 自动提交更改
          scoop checkver -u -f --commit "chore: update {{.AppName}} to {{.Version}}"
          
          # 推送更改（仅当有 commit 时）
          if (git diff --quiet HEAD~1) {
            Write-Host "No updates found."
          } else {
            git push origin main
            Write-Host "Updates pushed successfully."
          }
