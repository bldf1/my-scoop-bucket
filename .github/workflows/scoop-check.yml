name: Scoop Autoupdate (Private)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: scoop-autoupdate
  cancel-in-progress: true

jobs:
  update:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update manifests
        uses: scoopinstaller/scoop-checkver-action@v1
        with:
          create-pr: false
          # 可选：自定义提交信息
          # commit-message: 'chore: update $app to $version'