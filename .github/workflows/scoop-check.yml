name: Scoop Autoupdate (Private)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# 【新增】防止并发执行导致 push 冲突
concurrency:
  group: scoop-autoupdate
  cancel-in-progress: true

jobs:
  update:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 【建议】完整历史，避免 checkver 比对异常

      - name: Update manifests
        uses: scoopinstaller/scoop-checkver-action@v1
        with:
          create-pr: false